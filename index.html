<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liga Vitória — Dashboard TV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080b14;--panel:#0d1221;--card:#111827;--border:#1e2a45;
  --blue:#2563eb;--cyan:#06b6d4;--green:#16a34a;--green2:#22c55e;
  --red:#dc2626;--red2:#ef4444;--gold:#f59e0b;
  --text:#e2e8f0;--muted:#4b5a7a;--muted2:#64748b;
}
html,body{height:100vh;overflow:hidden;background:var(--bg);font-family:'Barlow',sans-serif;color:var(--text);display:flex;flex-direction:column;}

header{height:70px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--panel);border-bottom:1px solid var(--border);position:relative;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),var(--cyan),var(--blue),transparent);background-size:300% 100%;animation:scan 4s linear infinite;}
@keyframes scan{0%{background-position:200% 0}100%{background-position:-100% 0}}
.h-logo img{height:46px;mix-blend-mode:screen;filter:brightness(1.2);}
.h-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
.h-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--muted2);}
.h-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;color:#fff;}
.h-right{text-align:right;}
.h-date{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);}
.h-clock{font-size:32px;font-weight:300;letter-spacing:5px;font-variant-numeric:tabular-nums;color:#fff;}

.main{flex:1;min-height:0;position:relative;overflow:hidden;}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .7s ease;pointer-events:none;padding:20px 32px;display:flex;flex-direction:column;gap:14px;}
.slide.active{opacity:1;pointer-events:auto;}

.kpi-row{display:grid;gap:12px;flex-shrink:0;}
.kpi-row.cols-2{grid-template-columns:repeat(2,1fr);}
.kpi-row.cols-4{grid-template-columns:repeat(4,1fr);}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.blue::before{background:linear-gradient(90deg,var(--blue),var(--cyan));}
.kpi.green::before{background:var(--green2);}
.kpi.red::before{background:var(--red2);}
.kpi.gold::before{background:var(--gold);}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
.kpi-value{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;line-height:1;color:#fff;}
.kpi-value.big{font-size:52px;}
.kpi-sub{font-size:11px;color:var(--muted2);margin-top:5px;}
.kpi-sub b{color:var(--text);}

.chart-section{flex:1;min-height:0;display:flex;flex-direction:column;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 22px;gap:14px;}
.chart-top{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.chart-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);display:flex;align-items:center;gap:10px;}
.chart-label span{display:inline-block;width:3px;height:16px;background:linear-gradient(180deg,var(--blue),var(--cyan));border-radius:2px;}
.legend{display:flex;gap:16px;align-items:center;}
.leg-item{display:flex;align-items:center;gap:6px;}
.leg-dot{width:10px;height:10px;border-radius:2px;}
.leg-text{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:rgba(22,163,74,.15);color:var(--green2);border:1px solid rgba(22,163,74,.3);}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green2);animation:pulse 1.5s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.bars-wrap{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:space-around;}
.bar-row{display:grid;grid-template-columns:210px 1fr 100px;align-items:center;gap:16px;padding:5px 0;}
.bar-row+.bar-row{border-top:1px solid rgba(255,255,255,0.04);}
.bar-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--text);text-align:right;line-height:1.2;}
.bar-name small{display:block;font-size:11px;font-weight:400;color:var(--muted2);letter-spacing:.5px;margin-top:1px;}
.bar-track{height:44px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden;display:flex;}
.bar-g{height:100%;background:linear-gradient(90deg,#15803d,#22c55e);display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;color:#fff;white-space:nowrap;min-width:0;}
.bar-r{height:100%;background:linear-gradient(90deg,#b91c1c,#ef4444);display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;color:#fff;white-space:nowrap;min-width:0;}
.bar-pct{font-family:'Barlow Condensed',sans-serif;text-align:center;}
.bar-pct-v{font-size:30px;font-weight:800;color:var(--green2);line-height:1;}
.bar-pct-v.low{color:var(--red2);}
.bar-pct-l{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:1px;}

footer{height:38px;flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;gap:10px;}
.prog-track{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(37,99,199,.1);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));width:0%;}
.dot{height:3px;width:22px;border-radius:2px;background:rgba(255,255,255,.1);transition:width .35s,background .35s;cursor:pointer;}
.dot.active{width:38px;background:var(--blue);}
.f-left{position:absolute;left:18px;font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.12);}
.f-right{position:absolute;right:18px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);}
.f-refresh{position:absolute;right:80px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(37,99,199,.6);font-weight:600;}

.loading-overlay{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50;transition:opacity .6s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:40px;height:40px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--blue);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);}
.error-msg{font-size:13px;color:var(--red2);letter-spacing:1px;display:none;}
</style>
</head>

          <div class="leg-item"><div class="leg-dot" style="background:#22c55e"></div><div class="leg-text">Alcançada</div></div>
          <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div><div class="leg-text">Faltante</div></div>
        </div>
        <div class="status-badge"><div class="pulse"></div>Ao vivo</div>
      </div>
      <div class="bars-wrap" id="bars-meta"></div>
    </div>
  </div>

  <!-- SLIDE 1: COMERCIAL SMJ -->
  <div class="slide" id="slide-1">
    <div class="kpi-row cols-2" id="kpi-smj"></div>
    <div class="chart-section">
      <div class="chart-top">
        <div class="chart-label"><span></span>Comercial SMJ — Alcance por Corretor</div>
        <div class="legend">
          <div class="leg-item"><div class="leg-dot" style="background:#22c55e"></div><div class="leg-text">Alcançado</div></div>
          <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div><div class="leg-text">Faltante</div></div>
        </div>
        <div class="status-badge"><div class="pulse"></div>Ao vivo</div>
      </div>
      <div class="bars-wrap" id="bars-smj"></div>
    </div>
  </div>
</div>

<footer>
  <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
  <div class="f-left" id="f-counter">01 / 02</div>
  <div class="dot active" id="dot-0" onclick="goSlide(0)"></div>
  <div class="dot" id="dot-1" onclick="goSlide(1)"></div>
  <div class="f-refresh" id="f-refresh"></div>
  <div class="f-right" id="f-timer">--s</div>
</footer>

<script>
const SLIDES=[
  {id:'slide-0',title:'Meta Geral — Corretora'},
  {id:'slide-1',title:'Comercial — SMJ'},
];
const ROTATE_MS=15000;
const REFRESH_MIN=5;

// CORS proxy — converte fetch local em request server-side
const PROXY='https://api.allorigins.win/raw?url=';
const CSV_META=PROXY+encodeURIComponent('https://docs.google.com/spreadsheets/d/e/2PACX-1vS0NPp-ymZjFPn9rz3E1sTOrpK4uWJOcLDbs2l43Ypw-xgUxOZB3NNgZbU8ux3wg2hooXbFgfXbh-tM/pub?gid=89854617&single=true&output=csv');
const CSV_COM =PROXY+encodeURIComponent('https://docs.google.com/spreadsheets/d/e/2PACX-1vQx7mdgyvFAQzKAIkviNVzyHvJQRWl2IT5pgT5Z7A6CYY7jhOCWAF0DK3xp1YF-8DENRKaXNYZhuEtf/pub?gid=759908653&single=true&output=csv');

let current=0,startTime=Date.now(),lastRefresh=Date.now();

// ── CSV parser ──
function parseCSV(txt){
  return txt.split('\n').map(line=>{
    const cols=[];let cur='',inQ=false;
    for(const c of line){
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
      else cur+=c;
    }
    cols.push(cur.trim());
    return cols;
  });
}
function num(s){
  if(!s)return 0;
  return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;
}
function brl(n){
  return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

// ── Fetch ──
async function fetchData(){
  try{
    document.getElementById('loading-text').textContent='Buscando dados...';
    document.getElementById('loading').classList.remove('hidden');

    const [r1,r2]=await Promise.all([fetch(CSV_META),fetch(CSV_COM)]);
    if(!r1.ok||!r2.ok) throw new Error('Erro HTTP');
    const [t1,t2]=await Promise.all([r1.text(),r2.text()]);

    renderMeta(parseCSV(t1));
    renderComercial(parseCSV(t2));
    lastRefresh=Date.now();
    document.getElementById('loading').classList.add('hidden');
  }catch(e){
    console.error(e);
    const em=document.getElementById('error-msg');
    em.style.display='block';
    em.textContent='Erro ao carregar dados. Tentando novamente em '+REFRESH_MIN+'min...';
    document.getElementById('loading-text').textContent='Falha na conexão';
    setTimeout(()=>document.getElementById('loading').classList.add('hidden'),3000);
  }
}

// ── Render Meta Geral ──
function renderMeta(rows){
  const setores=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!r[0]||!r[0].trim())continue;
    const meta=num(r[1]),alc=num(r[2]),falt=num(r[4]),pct=num(r[5]);
    if(meta>0) setores.push({nome:r[0].trim(),meta,alc,falt,pct});
    if(setores.length>=4)break;
  }

  const colors=['blue','green','red','gold'];
  document.getElementById('kpi-meta').innerHTML=setores.map((s,i)=>`
    <div class="kpi ${colors[i]}">
      <div class="kpi-label">${s.nome.replace(/\s*\(.*?\)/g,'').trim()}</div>
      <div class="kpi-value">${brl(s.alc)}</div>
      <div class="kpi-sub">Meta: <b>${brl(s.meta)}</b> &nbsp;|&nbsp; <b style="color:${s.pct>=70?'#22c55e':'#ef4444'}">${s.pct.toFixed(1)}%</b> alcançado</div>
    </div>`).join('');

  document.getElementById('bars-meta').innerHTML=setores.map(s=>{
    const low=s.pct<50;
    const match=s.nome.match(/\(.*?\)/);
    const sub=match?match[0]:'';
    const title=s.nome.replace(/\s*\(.*?\)/,'').trim();
    return `
    <div class="bar-row">
      <div class="bar-name">${title}<small>${sub}</small></div>
      <div class="bar-track">
        <div class="bar-g" style="width:${s.pct}%">${s.pct>=10?s.pct.toFixed(2)+'%':''}</div>
        <div class="bar-r" style="width:${s.falt}%">${s.falt>=10?s.falt.toFixed(2)+'%':''}</div>
      </div>
      <div class="bar-pct">
        <div class="bar-pct-v ${low?'low':''}">${s.pct.toFixed(1)}%</div>
        <div class="bar-pct-l">alcançado</div>
      </div>
    </div>`;}).join('');
}

// ── Render Comercial ──
function renderComercial(rows){
  const corr=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!r[0]||!r[0].trim())continue;
    const meta=num(r[1]),alc=num(r[2]),falt=num(r[4]),pct=num(r[5]);
    if(meta>0) corr.push({nome:r[0].trim(),meta,alc,falt,pct});
  }

  document.getElementById('kpi-smj').innerHTML=corr.map(c=>`
    <div class="kpi ${c.pct>=70?'green':'red'}">
      <div class="kpi-label">${c.nome}</div>
      <div class="kpi-value big">${c.pct.toFixed(2)}<span style="font-size:24px;font-weight:400">%</span></div>
      <div class="kpi-sub">Realizado: <b>${brl(c.alc)}</b> &nbsp;|&nbsp; Meta: <b>${brl(c.meta)}</b></div>
    </div>`).join('');

  document.getElementById('bars-smj').innerHTML=corr.map(c=>`
    <div class="bar-row" style="grid-template-columns:150px 1fr 110px">
      <div class="bar-name" style="font-size:24px">${c.nome}</div>
      <div class="bar-track" style="height:58px">
        <div class="bar-g" style="width:${c.pct}%;font-size:24px">${c.pct>=10?c.pct.toFixed(2)+'%':''}</div>
        <div class="bar-r" style="width:${c.falt}%;font-size:24px">${c.falt>=10?c.falt.toFixed(2)+'%':''}</div>
      </div>
      <div class="bar-pct">
        <div class="bar-pct-v ${c.pct<50?'low':''}" style="font-size:40px">${c.pct.toFixed(1)}%</div>
        <div class="bar-pct-l">alcançado</div>
      </div>
    </div>`).join('');
}

// ── Clock ──
function tick(){
  const now=new Date();
  document.getElementById('h-clock').textContent=now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('h-date').textContent=now.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
  const rem=Math.max(0,Math.ceil(ROTATE_MS/1000-(Date.now()-startTime)/1000));
  document.getElementById('f-timer').textContent=rem+'s';
  const sinceRef=Math.floor((Date.now()-lastRefresh)/1000);
  const nextRef=REFRESH_MIN*60-sinceRef;
  if(nextRef>0){const m=Math.floor(nextRef/60),s=nextRef%60;document.getElementById('f-refresh').textContent='↻ '+(m>0?m+'m ':'')+s+'s';}
}
setInterval(tick,1000);tick();

// ── Progress ──
function animProg(){
  document.getElementById('prog').style.width=Math.min(((Date.now()-startTime)/ROTATE_MS)*100,100)+'%';
  requestAnimationFrame(animProg);
}
animProg();

// ── Slide switch ──
function goSlide(idx){
  SLIDES.forEach((s,i)=>{
    document.getElementById(s.id).classList.toggle('active',i===idx);
    document.getElementById('dot-'+i).classList.toggle('active',i===idx);
  });
  document.getElementById('h-title').textContent=SLIDES[idx].title;
  document.getElementById('f-counter').textContent=String(idx+1).padStart(2,'0')+' / '+String(SLIDES.length).padStart(2,'0');
  current=idx;startTime=Date.now();
  const bar=document.getElementById('prog');
  bar.style.transition='none';bar.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    bar.style.transition='width '+ROTATE_MS+'ms linear';bar.style.width='100%';
  }));
}

setInterval(()=>goSlide((current+1)%SLIDES.length),ROTATE_MS);
setInterval(fetchData,REFRESH_MIN*60*1000);

goSlide(0);
fetchData();
</script>
</body>
</html>
