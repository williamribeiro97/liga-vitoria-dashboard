<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liga Vitória — Dashboard TV</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="h-logo"><img src="assets/logo.png" alt="Liga Vitória"></div>
  <div class="h-center">
    <div class="h-eyebrow">Dashboard de Metas</div>
    <div class="h-title" id="h-title">Meta Geral — Corretora</div>
  </div>
  <div class="h-right">
    <div class="h-date" id="h-date"></div>
    <div class="h-clock" id="h-clock">--:--:--</div>
  </div>
</header>

<div class="main">
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Carregando dados...</div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- SLIDE 0: META GERAL -->
  <div class="slide" id="slide-0">
    <div class="kpi-row cols-4" id="kpi-meta"></div>
    <div class="chart-section">
      <div class="chart-top">
        <div class="chart-label"><span></span>Alcance por Setor</div>
        <div class="legend">
          <div class="leg-item"><div class="leg-dot" style="background:#22c55e"></div><div class="leg-text">Alcançada</div></div>
          <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div><div class="leg-text">Faltante</div></div>
        </div>
        <div class="status-badge"><div class="pulse"></div>Ao vivo</div>
      </div>
      <div class="bars-wrap" id="bars-meta"></div>
    </div>
  </div>

  <!-- SLIDE 1: COMERCIAL SMJ -->
  <div class="slide" id="slide-1">
    <div class="kpi-row cols-2" id="kpi-smj"></div>
    <div class="chart-section">
      <div class="chart-top">
        <div class="chart-label"><span></span>Comercial SMJ — Alcance por Corretor</div>
        <div class="legend">
          <div class="leg-item"><div class="leg-dot" style="background:#22c55e"></div><div class="leg-text">Alcançado</div></div>
          <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div><div class="leg-text">Faltante</div></div>
        </div>
        <div class="status-badge"><div class="pulse"></div>Ao vivo</div>
      </div>
      <div class="bars-wrap" id="bars-smj"></div>
    </div>
  </div>
</div>

<footer>
  <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
  <div class="f-left" id="f-counter">01 / 02</div>
  <div class="dot active" id="dot-0" onclick="goSlide(0)"></div>
  <div class="dot" id="dot-1" onclick="goSlide(1)"></div>
  <div class="f-refresh" id="f-refresh"></div>
  <div class="f-right" id="f-timer">--s</div>
</footer>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
